<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Tablet-first viewport — no zooming, full screen -->
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
               minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Android / Chrome PWA -->
    <meta name="theme-color" content="#0b0d10" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="HospoStack POS" />

    <!-- iOS PWA (Safari on iPad) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HospoStack" />

    <!-- Windows tile -->
    <meta name="msapplication-TileColor" content="#0b0d10" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Prevent text size adjustment on orientation change -->
    <meta name="HandheldFriendly" content="True" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts — loaded async so they don't block native render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <title>HospoStack POS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
